name: Criar Cards no Jira (Manual)

# 1. Habilita o botão "Run workflow"
on:
  workflow_dispatch:

jobs:
  criar-cards:
    runs-on: ubuntu-latest
    steps:
      # 2. Baixa o código (para pegar o arquivo relatorio.md)
      - name: Checkout
        uses: actions/checkout@v3

      # 3. Configura o Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # 4. Instala a biblioteca para falar com o Jira
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 5. Script que lê o MD e cria os cards
      - name: Processar MD e Criar Issues
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
        run: |
          python << 'EOF'
