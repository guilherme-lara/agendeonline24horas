          project_key = os.getenv('JIRA_PROJECT_KEY')
          
          # Autenticação
          auth = (email, token)
          headers = {"Accept": "application/json", "Content-Type": "application/json"}

          # Lê o arquivo relatorio.md
          try:
              with open('relatorio.md', 'r', encoding='utf-8') as f:
                  content = f.read()
          except FileNotFoundError:
              print("Erro: Arquivo 'relatorio.md' não encontrado no repositório!")
              exit(1)

          # Extrai títulos que começam com ##
          lines = content.split('\n')
          tasks = []
          current_task = None

          for line in lines:
              if line.startswith('## '):
                  if current_task:
                      tasks.append(current_task)
                  current_task = {'summary': line.replace('## ', '').strip(), 'description': []}
              elif current_task and line.strip():
                  current_task['description'].append(line)
          
          if current_task:
