name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  static-checks:
    name: Lint & TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript type-check
        run: npx tsc --noEmit

  console-checks:
    name: Console Checks (Booking & Clientes)
    runs-on: ubuntu-latest
    needs: static-checks
    env:
      CI: "true"
      E2E_BASE_URL: http://localhost:5173
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run console checks
        run: npx playwright test e2e/console-checks.spec.ts --project=chromium

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
